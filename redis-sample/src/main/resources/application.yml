spring:
  data:
    redis:
      # Official format (standalone or cluster.nodes) -> defaultRedisTemplate
      host: localhost
      port: 6379
      # Multi-cluster format -> {name}RedisTemplate
      clusters:
        cache:
          cluster:
            nodes:
              - localhost:7001
              - localhost:7002
              - localhost:7003
            max-redirects: 3
          serializer:
            key: string
            value: json
            hash-key: string
            hash-value: json
          timeout: 5000ms
          lettuce:
            pool:
              max-active: 16
              max-idle: 8
              min-idle: 2
              max-wait: 10000ms
            cluster:
              refresh:
                adaptive: true
                period: 2000ms
        session:
          cluster:
            nodes:
              - localhost:7011
              - localhost:7012
              - localhost:7013
            max-redirects: 3
          serializer:
            key: string
            value: json
            hash-key: string
            hash-value: json
          timeout: 5000ms
          lettuce:
            pool:
              max-active: 16
              max-idle: 8
              min-idle: 2
              max-wait: 10000ms
            cluster:
              refresh:
                adaptive: true
                period: 2000ms
